<div class="auth-wrapper">
  <form class="auth-card" (ngSubmit)="onSubmit()">
    <h1>Create Account</h1>
    <p class="subtitle">Sign up to get started</p>

    <label>Name</label>
    <input type="text" [(ngModel)]="name" name="name" placeholder="Your name" />

    <label>Email</label>
    <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />

    <label>Password</label>
    <input type="password" [(ngModel)]="password" name="password" placeholder="At least 6 characters" />

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <button class="btn btn-primary" type="submit" [disabled]="loading">
      {{ loading ? 'Creating account...' : 'Register' }}
    </button>

    <p class="switch-link">
      Already have an account? <a routerLink="/login">Login</a>
    </p>
  </form>
</div>
