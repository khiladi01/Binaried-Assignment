<div class="auth-wrapper">
  <form class="auth-card" (ngSubmit)="onSubmit()">
    <h1>Welcome Back</h1>
    <p class="subtitle">Login to manage your tasks</p>

    <label>Email</label>
    <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />

    <label>Password</label>
    <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" />

    <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

    <button class="btn btn-primary" type="submit" [disabled]="loading">
      {{ loading ? 'Logging in...' : 'Login' }}
    </button>

    <p class="switch-link">
      Don't have an account? <a routerLink="/register">Register</a>
    </p>
  </form>
</div>
